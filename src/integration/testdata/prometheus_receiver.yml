---

receivers:
  otlp/test:
    protocols:
      grpc:
        endpoint: 127.0.0.1:{{.IngressOTLPPort}}
        tls:
          key_pem: "{{.KeyPem}}"
          cert_pem: "{{.CertPem}}"
  prometheus/test:
    config:
      scrape_configs:
        - job_name: 'fake-metrics-server'
          scrape_interval: 2s
          static_configs:
            - targets: [127.0.0.1:{{.IngressPromPort}}]

processors:
  batch:

exporters:
  otlp:
    endpoint: 127.0.0.1:{{.EgressOTLPPort}}
    tls:
      ca_pem: "{{.CaPem}}"

service:
  pipelines:
    metrics:
      receivers: [otlp/test, prometheus/test]
      processors: [batch]
      exporters: [otlp]
  telemetry:
    metrics:
      readers:
        - periodic:
            exporter:
              otlp:
                protocol: http/protobuf
                endpoint: "https://127.0.0.1:{{.MetricsPort}}"
